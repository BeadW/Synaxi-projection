[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "synaxi-projection"
version = "0.1.0"
description = "Projection-only wrapper and benchmark tooling for Claude Code style agent runs"
readme = "README.md"
requires-python = ">=3.9"
dependencies = []

[project.scripts]
synaxi-projection-benchmark = "synaxi_projection.benchmark:main"

[tool.setuptools]
packages = ["synaxi_projection"]
